services:
  logger:
    build: .
    container_name: ccbm-logger
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      FRONTEND_ORIGINS: "https://gros.ccbme.sn"
      LOG_RETENTION_DAYS: 30
      MAX_REQUESTS_PER_MINUTE: 300
    volumes:
      - logger_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/stats/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  logger_logs:
    driver: local
